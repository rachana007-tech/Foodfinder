<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Feedback | Karnataka Food Finder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Background image + gold overlay */
        body {
            background:
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.88)),
                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1350&q=80")
                no-repeat center center fixed;
            background-size: cover;
            font-family: "Poppins", sans-serif;
        }

        /* Navigation bar */
        .navbar {
            background: rgba(0,0,0,0.8);
            padding: 12px 0;
        }
        .navbar-brand {
            color: #f5d67b !important;
            font-weight: 700;
            font-size: 22px;
        }
        .nav-link {
            color: #f5d67b !important;
            font-weight: 600;
        }

        /* Feedback Card */
        .feedback-card {
            max-width: 680px;
            margin: 60px auto;
            padding: 35px;
            border-radius: 18px;
            background: rgba(20,20,20,0.95);
            border: 1px solid #f5d67b;
            box-shadow: 0 15px 30px rgba(255,215,0,0.25);
            animation: fadeIn 0.9s ease-in-out;
            color: #f5d67b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title-icon {
            font-size: 50px;
        }

        label {
            font-weight: 600;
            color: #f5d67b;
        }

        .form-select, .form-control {
            background: #111;
            border: 1px solid #f5d67b;
            color: #f5d67b;
        }

        .form-select option {
            background: black;
            color: #f5d67b;
        }

        .form-control::placeholder {
            color: #c9a94b;
        }

        /* Gold button */
        .btn-theme {
            background: #f5d67b;
            color: black;
            font-weight: bold;
            border-radius: 25px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-theme:hover {
            background: #d9b84a;
            color: black;
        }

        /* Success Box */
        .success-box {
            border-radius: 12px;
            padding: 10px;
            background: #d4edda;
            color: #276738;
            font-weight: 600;
        }

    </style>
</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🍽 Karnataka Food Finder</a>

        <div>
            <a class="nav-link d-inline-block" href="{% url 'home' %}">⬅ Back to Home</a>
        </div>
    </div>
</nav>

<div class="container">

    <div class="feedback-card">

        <div class="text-center mb-4">
            <div class="title-icon">💬</div>
            <h2 class="fw-bold">Your Feedback Matters</h2>
            <p class="text-light">Help us improve Karnataka's food experience!</p>
        </div>

        {% if success %}
        <div class="success-box mb-3 text-center">
            ✔ Thank you! Your feedback has been submitted successfully.
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Dish -->
            <div class="mb-3">
                <label>Select Dish</label>
                <select name="dish" class="form-select shadow-sm" required>
                    <option disabled selected>Choose a dish</option>
                    {% for d in dishes %}
                    <option value="{{ d.id }}">{{ d.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Restaurant -->
            <div class="mb-3">
                <label>Select Restaurant</label>
                <select name="restaurant" class="form-select shadow-sm" required>
                    <option disabled selected>Choose a restaurant</option>
                    {% for r in restaurants %}
                    <option value="{{ r.id }}">{{ r.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Rating -->
            <div class="mb-3">
                <label>Rating</label>
                <select name="rating" class="form-select shadow-sm" required>
                    <option disabled selected>Select rating</option>
                    <option value="5">⭐ 5 - Excellent</option>
                    <option value="4">⭐ 4 - Very Good</option>
                    <option value="3">⭐ 3 - Good</option>
                    <option value="2">⭐ 2 - Average</option>
                    <option value="1">⭐ 1 - Poor</option>
                </select>
            </div>

            <!-- Comment -->
            <div class="mb-3">
                <label>Your Comments</label>
                <textarea
                    name="comment"
                    class="form-control shadow-sm"
                    rows="4"
                    placeholder="Share your experience..."
                    required></textarea>
            </div>

            <button class="btn btn-theme w-100 mt-2">Submit Feedback</button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
