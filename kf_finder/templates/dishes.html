<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>All Karnataka Dishes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Background image + black overlay */
        body {
            background: 
                linear-gradient(rgba(73, 70, 70, 0.75), rgba(40, 38, 38, 0.85)),
                url("https://thumbs.dreamstime.com/b/south-indian-food-wooden-background-served-banana-leaf-138617858.jpg")
                no-repeat center center fixed;
            background-size: cover;
            font-family: "Poppins", sans-serif;
            color: #f5d67b;
        }

        /* Back Button */
        .btn-back {
            background: #f5d67b;
            color: #000;
            border-radius: 25px;
            font-weight: bold;
            padding: 8px 18px;
            transition: 0.3s ease;
        }

        .btn-back:hover {
            background: #d9b849;
            color: black;
        }

        /* Dish Card */
        .dish-card {
            border-radius: 18px;
            overflow: hidden;
            transition: 0.3s ease;
            background: rgba(21, 1, 1, 0.693);
            border: 1px solid #444;
        }

        .dish-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 30px rgba(255, 215, 0, 0.35);
            border-color: #f5d67b;
        }

        .dish-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
        }

        .dish-title {
            color: #f5d67b;
            font-weight: 700;
        }

        /* Gold button */
        .btn-theme {
            background: #f5d67b;
            color: black;
            border-radius: 25px;
            font-weight: bold;
        }

        .btn-theme:hover {
            background: #d9b849;
        }

        /* Gold badge */
        .badge-custom {
            background: #f5d67b;
            color: black;
            font-weight: 600;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <!-- BACK BUTTON -->
    <a href="{% url 'home' %}" class="btn btn-back mb-4">
        ← Back to Home
    </a>

    <!-- PAGE TITLE -->
    <h2 class="fw-bold mb-4 text-center" style="color:#f5d67b;">
        🍽 Karnataka Local Dishes
    </h2>

    <!-- DISH GRID -->
    <div class="row g-4">

        {% for dish in dishes %}
        <div class="col-md-4 col-lg-3">

            <div class="card dish-card shadow-sm">

                {% if dish.image %}
                    <img src="{{ dish.image.url }}" class="dish-img">
                {% elif dish.image_url %}
                    <img src="{{ dish.image_url }}" class="dish-img">
                {% else %}
                    <img src="https://i.imgur.com/Fv7bE1f.jpeg" class="dish-img">
                {% endif %}

                <div class="card-body">

                    <h5 class="dish-title">{{ dish.name }}</h5>

                    <span class="badge badge-custom mb-1">{{ dish.category }}</span>
                    <span class="badge badge-custom mb-1">{{ dish.region }}</span>

                    <p class="mt-2 text-light">{{ dish.description|truncatewords:12 }}</p>

                    <a href="{% url 'dish_detail' dish.name %}" 
                       class="btn btn-theme w-100 mt-2">
                        View Details
                    </a>

                </div>

            </div>
        </div>

        {% empty %}
        <p class="text-center fw-bold fs-4" style="color:#f5d67b;">
            No dishes found.
        </p>
        {% endfor %}

    </div>

</div>

</body>
</html>
